name: CI

# Gate de qualidade do método ai-first (P-10). É o *required check* que precisa estar VERDE para
# o auto-merge em `develop` e para a promoção `develop → main`. Sem ele, não há autonomia segura.
#
# ADAPTE ao seu projeto: troque os comandos de `npm` pelos do seu ecossistema (pnpm/yarn, cargo,
# go, mvn, poetry…). O que o framework padroniza é o CONTRATO: typecheck + lint + test (+ eval se
# houver comportamento de IA) precisam rodar e passar em todo PR contra develop/main.

on:
  workflow_dispatch:
  pull_request:
    branches: [develop, main]
  # Merge queue: o GitHub constrói o merge prospectivo (PR + base atual) e roda os checks NELE,
  # pegando conflito semântico antes de entrar. Requer habilitar a merge queue + marcar `ci` como
  # required check em branch protection para develop/main (Settings → Branches).
  merge_group:
  # Sem `push:` de propósito: um commit que chega a develop/main já foi validado como head do PR
  # (e no merge prospectivo). Re-rodar no push pós-merge só re-testa a mesma árvore.

# Cancela um run superado do mesmo PR/merge-group: o loop autônomo faz push rápido; um run em voo
# para um commit antigo é desperdício assim que chega um mais novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Sem `cache: npm`: o setup-node falha alto quando não há lockfile. O passo abaixo só
          # ativa cache/instala quando há projeto JS (a gênese adapta isto ao ecossistema real).

      # Gate de qualidade AGNÓSTICO: detecta o ecossistema.
      #  • Projeto JS (tem package.json) → roda o CONTRATO typecheck + lint + test (adapte na gênese
      #    para pnpm/yarn/cargo/go/poetry…).
      #  • Repo do próprio método/plugin (sem app JS) → o gate é a VALIDAÇÃO DO PLUGIN (manifesto +
      #    inventário de subagentes/skills), que é o que este repo de fato entrega.
      - name: Quality gate (ecosystem-aware)
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            echo "→ Projeto JS detectado: rodando typecheck + lint + test."
            if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then npm ci; else npm install; fi
            npm run typecheck --if-present
            npm run lint --if-present
            npm test --if-present
            # Descomente na gênese se há comportamento de IA/agente (evals determinísticos):
            # npm run eval --if-present
          else
            echo "→ Sem package.json: repo do método/plugin. Gate = validação do plugin + coerência."
            node scripts/validate-plugin.mjs
            node scripts/check-coherence.mjs
          fi

  # Gate de segurança (P-13 — separação de papéis e cadeia de suprimentos fechada).
  # Um agente que escreve E mergeia código precisa de trava de segurança independente do "está verde".
  # Marque estes checks como REQUIRED em branch protection para develop/main (adapte as ferramentas
  # ao seu ecossistema — os exemplos abaixo são pontos de partida agnósticos).
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks varre o histórico do PR — precisa dos commits, não só do HEAD

      # 1) Secret scanning — nenhum segredo entra em claro (P-6/P-13). Ex.: gitleaks.
      #    A action exige GITHUB_TOKEN para ler os commits do PR.
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # só p/ organização (usuário não precisa)

      # 2) SAST — análise estática de segurança do código. Ex.: CodeQL, semgrep.
      #    Descomente e configure o `language:` do seu projeto.
      # - name: SAST (CodeQL)
      #   uses: github/codeql-action/init@v3
      #   with: { languages: 'javascript' }   # troque pela sua linguagem
      # - uses: github/codeql-action/analyze@v3

  # Dependency review — bloqueia PR que introduz dependência vulnerável/licença proibida (P-13).
  # Roda só em pull_request (a action exige o contexto do PR) E só quando há manifesto de dependências
  # a revisar — num repo de docs/plugin (sem manifesto) não há o que revisar, então o passo é pulado
  # em vez de falhar. Projetos JS/py/go reais têm manifesto e a revisão roda normalmente.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detectar manifesto de dependências
        id: manifests
        run: |
          if ls package.json requirements.txt pyproject.toml go.mod Cargo.toml pom.xml build.gradle 2>/dev/null | head -1 | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Sem manifesto de dependências — nada a revisar (repo de docs/plugin)."
          fi
      - name: Dependency review
        if: steps.manifests.outputs.present == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
